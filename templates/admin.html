{% extends "base.html" %}

{% block content %}

  <body>
      <div class="u-clearfix u-sheet u-sheet-1">
        <h4>Dotnetix SafEye Display admin:</h4>
            <form action={{url_for('admin_update_user')}} method="post">
                <h5>Old user:</h5>
                <p><label for="old_username">Old username:</label><input type=text name=old_username>
                <p><label for="old_password">Old password:</label><input type=password name=old_password>
                <h5>New user:</h5>
                <p><label for="new_username">New username:</label><input type=text name=new_username>
                <p><label for="new_password">New password:</label><input type=password name=new_password>
                <p><label for="confirm_new_password">Confirm password:</label><input type=password name=confirm_new_password>
                <p><input type=submit value=Update>{{ update_user_message }}
            </form>
      </div>
  </body>

</html>
{% endblock %}
